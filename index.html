<!DOCTYPE html>
<html>
<body><script>
let user = prompt("Usuario:");
let pass = prompt("Contraseña:");

if(user !== "ANGAVI2015@" || pass !== "@2015ANGAVI3499@"){
    document.body.innerHTML = "<h1>Acceso denegado</h1>";
}
</script>
  
<h2>ANGAVI IA</h2>

<input id="c" placeholder="Cantidad"><br>
<input id="m" placeholder="Maximo"><br>
<textarea id="s"></textarea><br>

<button onclick="go()">Analizar</button>
<pre id="r"></pre>

<script>
async function go(){
let c=parseInt(document.getElementById("c").value);
let m=parseInt(document.getElementById("m").value);
let s=document.getElementById("s").value.split("\\n").map(l=>l.split(",").map(Number));

let res=await fetch("https://angavi-backend.onrender.com",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({cantidad:c,maximo:m,secuencias:s})
});

let d=await res.json();
document.getElementById("r").textContent=JSON.stringify(d,null,2);

dibujarGrafica(d);    
}
</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="grafica"></canvas>

<script>
function dibujarGrafica(data){
    let valores = data.map(d => d.prob);
    let labels = data.map(d => "Inicio " + d.inicio);

    new Chart(document.getElementById("grafica"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Probabilidad",
                data: valores
            }]
        }
    });
}
</script>
</body>
</html>
